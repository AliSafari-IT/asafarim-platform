# Local development stack: only infrastructure services.
# Run the apps themselves with `pnpm dev`.
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: asafarim
      POSTGRES_USER: asafarim
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asafarim_dev}
    ports:
      # Host port 55435: 5432 (and 55432-55434) are taken by other local
      # PostgreSQL instances on the dev machine.
      - "55435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
