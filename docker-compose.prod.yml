services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: asafarim
      POSTGRES_USER: asafarim
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Bound to loopback only: lets host-side scripts (migrate/seed) connect
      # without exposing postgres to the internet.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - asafarim_net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args: &public-build-args
        NEXT_PUBLIC_COMPANY_NAME: ${NEXT_PUBLIC_COMPANY_NAME}
        NEXT_PUBLIC_PLATFORM_NAME: ${NEXT_PUBLIC_PLATFORM_NAME}
        NEXT_PUBLIC_HUB_NAME: ${NEXT_PUBLIC_HUB_NAME}
        NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL}
        NEXT_PUBLIC_HUB_URL: ${NEXT_PUBLIC_HUB_URL}
        NEXT_PUBLIC_SHOWCASE_URL: ${NEXT_PUBLIC_SHOWCASE_URL}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL}
        NEXT_PUBLIC_VIONTO_URL: ${NEXT_PUBLIC_VIONTO_URL}
        NEXT_PUBLIC_TESTORA_URL: ${NEXT_PUBLIC_TESTORA_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: https://asafarim.com
      AUTH_URL: https://asafarim.com
    depends_on:
      - postgres
    networks:
      - asafarim_net

  hub:
    build:
      context: .
      dockerfile: apps/hub/Dockerfile
      args: *public-build-args
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: https://hub.asafarim.com
      AUTH_URL: https://hub.asafarim.com
    depends_on:
      - postgres
    networks:
      - asafarim_net

  showcase:
    build:
      context: .
      dockerfile: apps/showcase/Dockerfile
      args: *public-build-args
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: https://showcase.asafarim.com
      AUTH_URL: https://showcase.asafarim.com
    depends_on:
      - postgres
    networks:
      - asafarim_net

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args: *public-build-args
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: https://admin.asafarim.com
      AUTH_URL: https://admin.asafarim.com
    depends_on:
      - postgres
    networks:
      - asafarim_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - asafarim_net

  vionto:
    build:
      context: .
      dockerfile: apps/vionto/Dockerfile
      args: *public-build-args
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: https://vionto.asafarim.com
      AUTH_URL: https://vionto.asafarim.com
    depends_on:
      - postgres
      - redis
    networks:
      - asafarim_net

  vionto-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.vionto-worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4g
    networks:
      - asafarim_net

  # testora keeps its OWN database, isolated from the shared Prisma Postgres.
  testora-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: e2e_testora
      POSTGRES_PASSWORD: ${TESTORA_DB_PASSWORD}
      POSTGRES_DB: e2e-testing-db
    ports:
      # Loopback only: lets host-side scripts (seed/inspect) reach it without
      # exposing testora's DB to the internet.
      - "127.0.0.1:5434:5432"
    volumes:
      - testora_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e_testora -d e2e-testing-db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - asafarim_net

  # One-shot: applies pending drizzle migrations, then exits. The app waits for
  # this to complete successfully before starting.
  testora-migrate:
    build:
      context: .
      dockerfile: apps/testora/Dockerfile
      target: migrator
    restart: "no"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      TESTORA_DATABASE_URL: postgres://e2e_testora:${TESTORA_DB_PASSWORD}@testora-postgres:5432/e2e-testing-db
    depends_on:
      testora-postgres:
        condition: service_healthy
    networks:
      - asafarim_net

  testora:
    build:
      context: .
      dockerfile: apps/testora/Dockerfile
      target: runner
      args: *public-build-args
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      TESTORA_DATABASE_URL: postgres://e2e_testora:${TESTORA_DB_PASSWORD}@testora-postgres:5432/e2e-testing-db
      NEXT_PUBLIC_APP_URL: https://testora.asafarim.com
    depends_on:
      testora-postgres:
        condition: service_healthy
      testora-migrate:
        condition: service_completed_successfully
    networks:
      - asafarim_net

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - hub
      - showcase
      - admin
      - vionto
      - testora
    networks:
      - asafarim_net

networks:
  asafarim_net:

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  testora_postgres_data:
