# Example workflow: run the Vionto Studio pipeline engine's test suite and
# gate on the fixture generator.
#
# The engine is pure JS with no database, no network, no live providers, and
# no secrets. The generator is the gate: it replays every brief's labeled
# event sequence, re-validates the terminal state/retryCount, structured-
# output validity, retry idempotency, and seeded-failure recovery, then
# rewrites the committed showcase fixtures; a drift means the fixtures/engine
# changed without regenerating, which fails the build.
name: Vionto Studio benchmark

on:
  push:
    paths:
      - "benchmarks/vionto/**"
      - "apps/showcase/app/projects/vionto/**"
      - ".github/workflows/vionto-benchmark.yml"
  pull_request:
    paths:
      - "benchmarks/vionto/**"
      - "apps/showcase/app/projects/vionto/**"
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run the pipeline engine test suite
        run: pnpm bench:vionto

      - name: Validate invariants and regenerate fixtures
        run: pnpm bench:vionto:fixtures

      - name: Fail if committed fixtures drifted
        run: git diff --exit-code -- apps/showcase/app/projects/vionto/_data
