name: Deploy to VPS

# Deploys the full Docker Compose stack (web, hub, showcase, admin, vionto,
# vionto-worker + postgres, redis, caddy) to the asafarim.com VPS.
#
# How it works: this job only SSHes into the VPS and runs the server-side
# script infra/scripts/vps-deploy.sh, which pulls the latest main, decrypts
# the production env with the age key already present on the server, rebuilds
# the images, and restarts the stack. No secrets other than SSH live here.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   VPS_HOST            e.g. 82.25.116.73
#   VPS_USER            e.g. root
#   VPS_SSH_KEY         private key whose public key is in the VPS authorized_keys
#   TELEGRAM_BOT_TOKEN  bot token from @BotFather
#   TELEGRAM_CHAT_ID    numeric chat ID for the destination chat

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 40m
          script_stop: true
          script: |
            set -e
            cd /var/repos/asafarim-com
            git fetch --prune origin main
            git reset --hard origin/main
            bash infra/scripts/vps-deploy.sh

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Notify Telegram on success
        if: needs.deploy.result == 'success'
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Deployment succeeded for asafarim-platform
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Actor: ${{ github.actor }}

      - name: Notify Telegram on failure
        if: needs.deploy.result == 'failure'
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Deployment FAILED for asafarim-platform
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Actor: ${{ github.actor }}
            See logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
