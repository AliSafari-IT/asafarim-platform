name: Deploy to VPS

# Deploys the full Docker Compose stack (web, hub, showcase, admin, vionto,
# vionto-worker + postgres, redis, caddy) to the asafarim.com VPS.
#
# How it works: this job only SSHes into the VPS and runs the server-side
# script infra/scripts/vps-deploy.sh, which pulls the latest main, decrypts
# the production env with the age key already present on the server, rebuilds
# the images, and restarts the stack. No secrets other than SSH live here.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   VPS_HOST     e.g. 82.25.116.73
#   VPS_USER     e.g. root
#   VPS_SSH_KEY  private key whose public key is in the VPS authorized_keys

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 40m
          script_stop: true
          script: bash /var/repos/asafarim-com/infra/scripts/vps-deploy.sh
